<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping &amp; To-Do</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:    #1c1a17;
      --paper:  #f6f1e9;
      --accent: #5c3d1e;
      --rule:   #c2a97a;
      --faint:  #e6ddd0;
      --mid:    #7a6040;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      font-size: 1.08rem;
      line-height: 1.85;
    }
    .page { max-width: 700px; margin: 0 auto; padding: 3.5rem 2rem 6rem; }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color 0.2s;
    }
    .back:hover { color: var(--accent); }
    header {
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 2px solid var(--rule);
      animation: fadeUp 0.7s ease both;
    }
    header .kicker {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 0.6rem;
    }
    header h1 {
      font-family: 'Lora', serif;
      font-size: 2.4rem;
      font-weight: 600;
      color: var(--accent);
    }
    .section {
      margin-bottom: 2.6rem;
      padding-bottom: 2.4rem;
      border-bottom: 1px solid var(--faint);
      animation: fadeUp 0.6s ease both;
    }
    .section:last-of-type { border-bottom: none; }
    .section:nth-child(1) { animation-delay: 0.1s; }
    .section:nth-child(2) { animation-delay: 0.2s; }
    .section:nth-child(3) { animation-delay: 0.3s; }
    .section h2 {
      font-family: 'Lora', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.9rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--faint);
    }
    ul {
      list-style: none;
      padding: 0;
    }
    ul li {
      padding: 0.35rem 0 0.35rem 1.4rem;
      position: relative;
      border-bottom: 1px dotted var(--faint);
    }
    ul li:last-child { border-bottom: none; }
    ul li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--rule);
    }
    footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--rule);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 520px) {
      .page { padding: 2rem 1.2rem 4rem; }
      header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
<div class="page">
  <a class="back" href="index.html">← Home</a>
  <header>
    <p class="kicker">Personal Reference</p>
    <h1>Shopping &amp; To-Do</h1>
  </header>

  <!-- ================================================
       Edit the list items below.
       Add a new item: <li>Your item here</li>
       Remove an item: delete the whole <li> line
       Add a new section: copy a whole section block
       ================================================ -->

  <div class="section">
    <h2>Shopping List</h2>
    <ul>
      <li>Item one</li>
      <li>Item two</li>
      <li>Item three</li>
      <li>Item four</li>
      <li>Item five</li>
    </ul>
  </div>

  <div class="section">
    <h2>To-Do</h2>
    <ul>
      <li>First thing to do</li>
      <li>Second thing to do</li>
      <li>Third thing to do</li>
    </ul>
  </div>

  <div class="section">
    <h2>Errands</h2>
    <ul>
      <li>First errand</li>
      <li>Second errand</li>
    </ul>
  </div>

  <footer>private · not indexed · personal reference</footer>
</div>
</body>
</html>
