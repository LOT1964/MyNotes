<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Pages</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:    #1c1a17;
      --paper:  #f6f1e9;
      --accent: #5c3d1e;
      --rule:   #c2a97a;
      --faint:  #e6ddd0;
      --mid:    #7a6040;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page {
      max-width: 500px;
      width: 100%;
      padding: 3rem 2rem;
      animation: fadeUp 0.7s ease both;
    }
    header {
      text-align: center;
      margin-bottom: 2.8rem;
      padding-bottom: 1.8rem;
      border-bottom: 2px solid var(--rule);
    }
    header .kicker {
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 0.5rem;
    }
    header h1 {
      font-family: 'Lora', serif;
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--accent);
    }
    .menu { display: flex; flex-direction: column; gap: 1rem; }
    .menu a {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 1.4rem;
      border: 1px solid var(--faint);
      background: white;
      text-decoration: none;
      color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      animation: fadeUp 0.6s ease both;
    }
    .menu a:nth-child(1) { animation-delay: 0.15s; }
    .menu a:nth-child(2) { animation-delay: 0.25s; }
    .menu a:nth-child(3) { animation-delay: 0.35s; }
    .menu a:hover {
      border-color: var(--rule);
      box-shadow: 0 4px 16px rgba(92,61,30,0.08);
      transform: translateY(-2px);
    }
    .menu a .icon { font-size: 1.5rem; flex-shrink: 0; }
    .menu a .text .title {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--accent);
      display: block;
    }
    .menu a .text .desc {
      font-size: 0.88rem;
      color: var(--mid);
      margin-top: 0.1rem;
    }
    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--rule);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <p class="kicker">Personal Reference</p>
    <h1>My Pages</h1>
  </header>
  <nav class="menu">
    <a href="breslin.html">
      <span class="icon">📜</span>
      <span class="text">
        <span class="title">The Name Breslin</span>
        <span class="desc">Origins, law, and legacy — Gaelic Ireland</span>
      </span>
    </a>
    <a href="notes.html">
      <span class="icon">📝</span>
      <span class="text">
        <span class="title">General Notes</span>
        <span class="desc">Personal notes and reference information</span>
      </span>
    </a>
    <a href="shopping.html">
      <span class="icon">🛒</span>
      <span class="text">
        <span class="title">Shopping &amp; To-Do</span>
        <span class="desc">Lists, errands, and reminders</span>
      </span>
    </a>
  </nav>
  <footer>private · not indexed</footer>
</div>
</body>
</html>
